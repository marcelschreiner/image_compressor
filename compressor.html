<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ms webdesign & code | Image Compressor</title>
    <style>
        :root {
            --accent: #dcbe9d;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
            --muted: #666;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Hanken Grotesk', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .app {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Dropzone */
        #dropzone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            height: 180px;
            border: 1px dashed #444;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        #dropzone:hover, #dropzone.drag {
            background: rgba(220,190,157,0.05);
            border-color: var(--accent);
        }

        #dropzone svg { opacity: 0.6; }
        #dropzone p { color: var(--text); font-size: 0.9rem; transition: color 0.3s; }
        #dropzone span { font-size: 0.75rem; color: var(--muted); }
        #file-input { display: none; }

        /* Output & Cards */
        #output-section { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .grid-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        label.lbl {
            display: block;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .lbl-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Inputs */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            transition: opacity 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
        
        input[type="range"]:disabled {
            cursor: not-allowed;
        }
        input[type="range"]:disabled::-webkit-slider-thumb {
            background: var(--muted);
            cursor: not-allowed;
        }

        .res-row { display: flex; align-items: center; gap: 8px; }
        .res-inp {
            background: #1e1e1e;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
            font-size: 0.85rem;
            outline: none;
        }
        .res-inp:focus { border-color: var(--accent); }

        .fmt-btns { display: flex; gap: 8px; }
        .fmt-btn {
            flex: 1;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .fmt-btn.active {
            background: rgba(220,190,157,0.1);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Stats & Pulse Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .pulsing {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .stat-val { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
        .stat-sub { font-size: 0.75rem; color: var(--muted); display: flex; justify-content: space-between; }
        .gold { color: var(--accent); }
        .fmt-badge { font-size: 0.65rem; opacity: 0.5; font-weight: 400; }

        /* Comparison Slider */
        .cmp-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            cursor: ew-resize;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .cmp-img {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        .cmp-after { 
            z-index: 1; 
            width: 100%;
        }

        .cmp-before-clipper {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            overflow: hidden;
            z-index: 2;
            border-right: 2px solid var(--accent);
        }

        .cmp-before-img {
            width: 100%;
        }

        .cmp-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .badge {
            position: absolute;
            top: 12px;
            padding: 4px 8px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            z-index: 4;
            pointer-events: none;
        }
        .badge-before { left: 12px; color: var(--muted); }
        .badge-after { right: 12px; color: var(--accent); }

        #dl-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        #dl-btn:hover { opacity: 0.9; }
        
        #dl-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div class="app">
    <h1><span>&lt;ms/&gt;</span> Image Optimizer</h1>

    <div id="dropzone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p id="dropzone-text">Bild hierher ziehen oder klicken</p>
        <span>WebP, JPG oder PNG bis 10MB</span>
        <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp" />
    </div>

    <div id="output-section">
        <div class="grid-controls">
            <div class="card">
                <label class="lbl">Qualität: <span id="q-label" class="gold">80%</span></label>
                <input type="range" id="q-slider" min="5" max="100" value="80">
            </div>
            <div class="card">
                <label class="lbl">Format</label>
                <div class="fmt-btns">
                    <button class="fmt-btn" data-fmt="image/jpeg">JPG</button>
                    <button class="fmt-btn" data-fmt="image/png">PNG</button>
                    <button class="fmt-btn active" data-fmt="image/webp">WebP</button>
                </div>
            </div>
            <div class="card">
                <label class="lbl">Max. Grösse (px)</label>
                <div class="res-row">
                    <input type="number" id="w-input" class="res-inp" placeholder="W" min="1">
                    <span style="color:var(--muted)">×</span>
                    <input type="number" id="h-input" class="res-inp" placeholder="H" min="1">
                </div>
            </div>
        </div>

        <div class="grid-controls" style="grid-template-columns: 1fr 1fr;">
            <div class="card">
                <label class="lbl lbl-flex">Original <span id="orig-fmt" class="fmt-badge"></span></label>
                <div id="orig-size" class="stat-val">—</div>
                <div id="orig-dim" class="stat-sub">—</div>
            </div>
            <div class="card">
                <label class="lbl gold lbl-flex">Optimiert <span id="new-fmt" class="fmt-badge"></span></label>
                <div id="new-size" class="stat-val gold">—</div>
                <div class="stat-sub">
                    <span id="new-dim">—</span>
                    <span id="size-diff" class="gold" style="font-weight: 600;"></span>
                </div>
            </div>
        </div>

        <div class="cmp-container" id="cmp-container" aria-label="Vorher und Nachher Bildvergleich">
            <div class="loading-overlay" id="loader">Wird optimiert... 0%</div>
            <div class="badge badge-before">VORHER</div>
            <div class="badge badge-after">NACHHER</div>
            
            <div class="cmp-img cmp-after" id="img-after"></div>
            
            <div class="cmp-before-clipper" id="cmp-clipper">
                <div class="cmp-img cmp-before-img" id="img-before"></div>
            </div>

            <div class="cmp-handle" id="cmp-handle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 3 12 9 6"/>
                    <polyline points="15 6 21 12 15 18"/>
                </svg>
            </div>
        </div>

        <a href="#" id="dl-btn" class="disabled">Optimiertes Bild speichern</a>
        <button id="reset-btn" style="background:transparent; border:none; color:var(--muted); font-size:0.7rem; width:100%; margin-top:12px; cursor:pointer; text-transform:uppercase;">Anderes Bild wählen</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<script>
    // --- 1. DOM Elements ---
    const els = {
        dropzone: document.getElementById('dropzone'),
        dropzoneText: document.getElementById('dropzone-text'),
        fileInput: document.getElementById('file-input'),
        outputSection: document.getElementById('output-section'),
        qSlider: document.getElementById('q-slider'),
        qLabel: document.getElementById('q-label'),
        wInput: document.getElementById('w-input'),
        hInput: document.getElementById('h-input'),
        dlBtn: document.getElementById('dl-btn'),
        loader: document.getElementById('loader'),
        newSize: document.getElementById('new-size'),
        sizeDiff: document.getElementById('size-diff'),
        origFmt: document.getElementById('orig-fmt'),
        origSize: document.getElementById('orig-size'),
        origDim: document.getElementById('orig-dim'),
        newFmt: document.getElementById('new-fmt'),
        newDim: document.getElementById('new-dim'),
        imgAfter: document.getElementById('img-after'),
        imgBefore: document.getElementById('img-before'),
        cmpContainer: document.getElementById('cmp-container'),
        cmpClipper: document.getElementById('cmp-clipper'),
        cmpHandle: document.getElementById('cmp-handle'),
        resetBtn: document.getElementById('reset-btn'),
        fmtBtns: document.querySelectorAll('.fmt-btn')
    };

    // --- 2. State Variables ---
    let state = {
        originalFile: null,
        baseName: 'image',
        format: 'image/webp',
        aspectRatio: 1,
        isProcessing: false,
        pendingProcess: false,
        isSliding: false,
        origUrl: null,
        newUrl: null
    };

    const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];

    // --- 3. Helper Functions ---
    const getFmtExt = (mime) => mime.split('/')[1].replace('jpeg', 'jpg');
    const getFmtName = (mime) => getFmtExt(mime).toUpperCase();
    
    const formatBytes = (bytes, decimals = 2) => {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    };

    const syncSliderWidth = () => {
        els.imgBefore.style.width = els.cmpContainer.offsetWidth + 'px';
    };

    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func(...args), wait);
        };
    }
    const debouncedProcessImage = debounce(() => processImage(), 300);

    // --- 4. Event Listeners ---
    els.dropzone.onclick = () => els.fileInput.click();
    els.fileInput.onchange = (e) => handleFile(e.target.files[0]);
    
    els.resetBtn.onclick = (e) => {
        e.preventDefault();

        els.imgBefore.style.backgroundImage = '';
        els.imgAfter.style.backgroundImage = '';
        
        if (state.origUrl) URL.revokeObjectURL(state.origUrl);
        if (state.newUrl) URL.revokeObjectURL(state.newUrl);
        
        state.originalFile = null;
        els.fileInput.value = '';
        els.outputSection.style.display = 'none';
        els.dropzone.style.display = 'flex';
        els.dropzoneText.innerText = 'Bild hierher ziehen oder klicken';
        els.dropzoneText.style.color = 'var(--text)';
        
        els.cmpClipper.style.width = '50%';
        els.cmpHandle.style.left = '50%';
        els.dlBtn.classList.add('disabled');
    };

    els.dropzone.ondragenter = (e) => { e.preventDefault(); els.dropzone.classList.add('drag'); };
    els.dropzone.ondragover = (e) => { e.preventDefault(); els.dropzone.classList.add('drag'); };
    els.dropzone.ondragleave = () => els.dropzone.classList.remove('drag');
    els.dropzone.ondrop = (e) => { 
        e.preventDefault(); 
        els.dropzone.classList.remove('drag');
        handleFile(e.dataTransfer.files[0]); 
    };

    els.qSlider.oninput = () => {
        if (state.format !== 'image/png') {
            els.qLabel.innerText = els.qSlider.value + '%';
        }
    };
    els.qSlider.onchange = () => debouncedProcessImage();
    
    els.fmtBtns.forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.fmt-btn.active').classList.remove('active');
            btn.classList.add('active');
            state.format = btn.dataset.fmt;
            
            if (state.format === 'image/png') {
                els.qSlider.disabled = true;
                els.qSlider.style.opacity = '0.4';
                els.qLabel.innerText = 'N/A';
            } else {
                els.qSlider.disabled = false;
                els.qSlider.style.opacity = '1';
                els.qLabel.innerText = els.qSlider.value + '%';
            }
            
            debouncedProcessImage();
        };
    });

    const updateDimensions = (isWidthChanged) => {
        let w = parseInt(els.wInput.value);
        let h = parseInt(els.hInput.value);
        
        if (isWidthChanged) {
            if (isNaN(w) || w <= 0) w = 1;
            els.wInput.value = w;
            els.hInput.value = Math.round(w / state.aspectRatio) || 1;
        } else {
            if (isNaN(h) || h <= 0) h = 1;
            els.hInput.value = h;
            els.wInput.value = Math.round(h * state.aspectRatio) || 1;
        }
        debouncedProcessImage();
    };
    els.wInput.onchange = () => updateDimensions(true);
    els.hInput.onchange = () => updateDimensions(false);

    window.addEventListener('resize', () => { if (state.originalFile) syncSliderWidth(); });

    // Kompletter Speicher-Cleanup beim Schliessen des Tabs
    window.addEventListener('beforeunload', () => {
        els.imgBefore.style.backgroundImage = '';
        els.imgAfter.style.backgroundImage = '';
        if (state.origUrl) URL.revokeObjectURL(state.origUrl);
        if (state.newUrl) URL.revokeObjectURL(state.newUrl);
    });

    // --- 5. Core Logic ---
    async function handleFile(file) {
        if (!file) return;

        els.dropzoneText.style.color = 'var(--text)';
        if (!allowedTypes.includes(file.type)) {
            els.dropzoneText.innerText = 'Fehler: Bitte nur JPG, PNG oder WebP!';
            els.dropzoneText.style.color = '#e57373';
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            els.dropzoneText.innerText = 'Fehler: Bild ist grösser als 10MB!';
            els.dropzoneText.style.color = '#e57373';
            return;
        }

        state.originalFile = file;
        state.baseName = file.name.replace(/\.[^/.]+$/, "");
        
        if (state.origUrl) {
            els.imgBefore.style.backgroundImage = '';
            URL.revokeObjectURL(state.origUrl);
        }
        state.origUrl = URL.createObjectURL(file);
        
        const img = new Image();
        img.src = state.origUrl;
        await img.decode();
        
        state.aspectRatio = img.width / img.height;
        els.wInput.value = img.width;
        els.hInput.value = img.height;
        
        els.origFmt.innerText = getFmtName(file.type);
        els.origSize.innerText = formatBytes(file.size);
        els.origDim.innerText = `${img.width} × ${img.height} px`;
        
        els.imgBefore.style.backgroundImage = `url(${state.origUrl})`;
        
        els.dropzone.style.display = 'none';
        els.outputSection.style.display = 'block';
        
        syncSliderWidth();
        processImage();
    }

    async function processImage() {
        if (!state.originalFile) return;
        if (state.isProcessing) {
            state.pendingProcess = true;
            return;
        }
        
        state.isProcessing = true;
        state.pendingProcess = false;
        
        els.dlBtn.classList.add('disabled');
        
        let actualProgress = 0;
        let simProgress = 0;
        
        els.loader.innerText = 'Wird optimiert... 0%';
        els.loader.style.display = 'flex';
        els.newSize.innerText = 'Berechne...';
        els.newSize.style.color = 'var(--accent)';
        els.newSize.classList.add('pulsing');
        els.sizeDiff.innerText = '';

        const progressInterval = setInterval(() => {
            if (simProgress < actualProgress) {
                simProgress += Math.max(1, Math.round((actualProgress - simProgress) / 2));
            } else if (simProgress < 95) {
                simProgress += 1;
            }
            els.loader.innerText = `Wird optimiert... ${simProgress}%`;
        }, 120);

        try {
            let safeQuality = state.format === 'image/png' ? 1 : (parseInt(els.qSlider.value) / 100);
            if (isNaN(safeQuality) || safeQuality <= 0 || safeQuality > 1) safeQuality = 0.8;
            
            let safeW = parseInt(els.wInput.value) || 1;
            let safeH = parseInt(els.hInput.value) || 1;

            const options = {
                maxSizeMB: 10,
                maxWidthOrHeight: Math.max(safeW, safeH),
                useWebWorker: true,
                initialQuality: safeQuality,
                fileType: state.format,
                onProgress: (progress) => { actualProgress = progress; }
            };

            const compressedBlob = await imageCompression(state.originalFile, options);
            
            if (state.newUrl) {
                els.imgAfter.style.backgroundImage = '';
                URL.revokeObjectURL(state.newUrl);
            }
            state.newUrl = URL.createObjectURL(compressedBlob);
            
            const actualImg = new Image();
            actualImg.src = state.newUrl;
            await actualImg.decode();

            els.newFmt.innerText = getFmtName(state.format);
            els.imgAfter.style.backgroundImage = `url(${state.newUrl})`;
            els.newSize.innerText = formatBytes(compressedBlob.size);
            els.newDim.innerText = `${actualImg.width} × ${actualImg.height} px`;
            
            const saved = ((compressedBlob.size - state.originalFile.size) / state.originalFile.size) * 100;
            els.sizeDiff.innerText = (saved > 0 ? '+' : '') + saved.toFixed(1) + '%';
            els.sizeDiff.style.color = saved <= 0 ? '#81c784' : '#e57373';

            els.dlBtn.href = state.newUrl;
            els.dlBtn.download = `${state.baseName}-optimized.${getFmtExt(state.format)}`;
            
            els.loader.innerText = 'Fertig!';
            els.dlBtn.classList.remove('disabled');

        } catch (error) {
            console.error("Compression failed", error);
            els.newSize.innerText = 'Fehlgeschlagen';
            els.newSize.style.color = '#e57373';
            els.sizeDiff.innerText = 'Fehler aufgetreten.';
            els.sizeDiff.style.color = '#e57373';
            els.loader.innerText = 'Fehler!';
        } finally {
            state.isProcessing = false;
            clearInterval(progressInterval);
            setTimeout(() => {
                els.loader.style.display = 'none';
            }, 300);
            els.newSize.classList.remove('pulsing');
            
            if (state.pendingProcess) {
                processImage();
            }
        }
    }

    // --- 6. Slider Interaction ---
    const handleSlide = (e) => {
        if (!state.isSliding || els.outputSection.style.display !== 'block') return;
        const rect = els.cmpContainer.getBoundingClientRect();
        const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        
        els.cmpClipper.style.width = percent + '%';
        els.cmpHandle.style.left = percent + '%';
    };

    els.cmpContainer.addEventListener('pointerdown', (e) => {
        state.isSliding = true;
        els.cmpContainer.setPointerCapture(e.pointerId);
    });
    
    window.addEventListener('pointerup', () => state.isSliding = false);
    els.cmpContainer.addEventListener('pointermove', handleSlide);

</script>
</body>
</html>
