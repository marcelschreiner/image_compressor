<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ms webdesign & code | Image Compressor</title>
    <style>
        :root {
            --accent: #dcbe9d;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
            --muted: #666;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Hanken Grotesk', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .app {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Dropzone */
        #dropzone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            height: 180px;
            border: 1px dashed #444;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        #dropzone:hover, #dropzone.drag {
            background: rgba(220,190,157,0.05);
            border-color: var(--accent);
        }

        #dropzone svg { opacity: 0.6; }
        #dropzone p { color: var(--text); font-size: 0.9rem; }
        #dropzone span { font-size: 0.75rem; color: var(--muted); }
        #file-input { display: none; }

        /* Output & Cards */
        #output-section { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .grid-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        label.lbl {
            display: block;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .lbl-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Inputs */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .res-row { display: flex; align-items: center; gap: 8px; }
        .res-inp {
            background: #1e1e1e;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
            font-size: 0.85rem;
            outline: none;
        }
        .res-inp:focus { border-color: var(--accent); }

        .fmt-btns { display: flex; gap: 8px; }
        .fmt-btn {
            flex: 1;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .fmt-btn.active {
            background: rgba(220,190,157,0.1);
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Stats & Pulse Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .pulsing {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .stat-val { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
        .stat-sub { font-size: 0.75rem; color: var(--muted); display: flex; justify-content: space-between; }
        .gold { color: var(--accent); }
        .fmt-badge { font-size: 0.65rem; opacity: 0.5; font-weight: 400; }

        /* Comparison Slider */
        .cmp-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            cursor: ew-resize;
            user-select: none;
            /* Verhindert Textmarkierung beim Ziehen */
            -webkit-user-select: none;
        }

        .cmp-img {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            /* Verhindert "Ghost-Dragging" des Bildes selbst */
            pointer-events: none;
        }

        .cmp-after { 
            z-index: 1; 
            width: 100%;
        }

        .cmp-before-clipper {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            overflow: hidden;
            z-index: 2;
            border-right: 2px solid var(--accent);
        }

        .cmp-before-img {
            width: 100%;
        }

        .cmp-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .badge {
            position: absolute;
            top: 12px;
            padding: 4px 8px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            z-index: 4;
            pointer-events: none;
        }
        .badge-before { left: 12px; color: var(--muted); }
        .badge-after { right: 12px; color: var(--accent); }

        #dl-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 16px;
            transition: opacity 0.2s;
        }
        #dl-btn:hover { opacity: 0.9; }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

    </style>
</head>
<body>

<div class="app">
    <h1><ms/> Image Optimizer</h1>

    <div id="dropzone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Bild hierher ziehen</p>
        <span>WebP, JPG oder PNG bis 10MB</span>
        <input type="file" id="file-input" accept="image/*" />
    </div>

    <div id="output-section">
        <div class="grid-controls">
            <div class="card">
                <label class="lbl">Qualität: <span id="q-label" class="gold">80%</span></label>
                <input type="range" id="q-slider" min="5" max="100" value="80">
            </div>
            <div class="card">
                <label class="lbl">Format</label>
                <div class="fmt-btns">
                    <button class="fmt-btn active" data-fmt="image/jpeg">JPG</button>
                    <button class="fmt-btn" data-fmt="image/png">PNG</button>
                    <button class="fmt-btn" data-fmt="image/webp">WebP</button>
                </div>
            </div>
            <div class="card">
                <label class="lbl">Grösse (px)</label>
                <div class="res-row">
                    <input type="number" id="w-input" class="res-inp" placeholder="W">
                    <span style="color:var(--muted)">×</span>
                    <input type="number" id="h-input" class="res-inp" placeholder="H">
                </div>
            </div>
        </div>

        <div class="grid-controls" style="grid-template-columns: 1fr 1fr;">
            <div class="card">
                <label class="lbl lbl-flex">Original <span id="orig-fmt" class="fmt-badge"></span></label>
                <div id="orig-size" class="stat-val">—</div>
                <div id="orig-dim" class="stat-sub">—</div>
            </div>
            <div class="card">
                <label class="lbl gold lbl-flex">Optimiert <span id="new-fmt" class="fmt-badge"></span></label>
                <div id="new-size" class="stat-val gold">—</div>
                <div class="stat-sub">
                    <span id="new-dim">—</span>
                    <span id="size-diff" class="gold" style="font-weight: 600;"></span>
                </div>
            </div>
        </div>

        <div class="cmp-container" id="cmp-container">
            <div class="loading-overlay" id="loader">Wird optimiert...</div>
            <div class="badge badge-before">VORHER</div>
            <div class="badge badge-after">NACHHER</div>
            
            <div class="cmp-img cmp-after" id="img-after"></div>
            
            <div class="cmp-before-clipper" id="cmp-clipper">
                <div class="cmp-img cmp-before-img" id="img-before"></div>
            </div>

            <div class="cmp-handle" id="cmp-handle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 3 12 9 6"/>
                    <polyline points="15 6 21 12 15 18"/>
                </svg>
            </div>
        </div>

        <a href="#" id="dl-btn" download="optimized.jpg">Optimiertes Bild speichern</a>
        <button id="reset-btn" style="background:transparent; border:none; color:var(--muted); font-size:0.7rem; width:100%; margin-top:12px; cursor:pointer; text-transform:uppercase;">Anderes Bild wählen</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<script>
    const fileInput = document.getElementById('file-input');
    const dropzone = document.getElementById('dropzone');
    const outputSection = document.getElementById('output-section');
    const qSlider = document.getElementById('q-slider');
    const qLabel = document.getElementById('q-label');
    const wInput = document.getElementById('w-input');
    const hInput = document.getElementById('h-input');
    const dlBtn = document.getElementById('dl-btn');
    const loader = document.getElementById('loader');
    
    // UI Elements for pulsing
    const newSizeEl = document.getElementById('new-size');
    const sizeDiffEl = document.getElementById('size-diff');

    let originalFile = null;
    let originalBaseName = 'image'; // Speichert den Namen ohne Endung
    let currentFormat = 'image/jpeg';
    let aspectRatio = 1;
    let isProcessing = false;

    // --- Comparison Slider Elements ---
    const container = document.getElementById('cmp-container');
    const clipper = document.getElementById('cmp-clipper');
    const beforeImg = document.getElementById('img-before');
    const handle = document.getElementById('cmp-handle');

    // --- Events ---
    dropzone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    document.getElementById('reset-btn').onclick = () => location.reload();

    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('drag'); };
    dropzone.ondragleave = () => dropzone.classList.remove('drag');
    dropzone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

    qSlider.oninput = () => { qLabel.innerText = qSlider.value + '%'; };
    qSlider.onchange = () => processImage();
    
    document.querySelectorAll('.fmt-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelector('.fmt-btn.active').classList.remove('active');
            btn.classList.add('active');
            currentFormat = btn.dataset.fmt;
            processImage();
        };
    });

    wInput.onchange = () => {
        hInput.value = Math.round(wInput.value / aspectRatio);
        processImage();
    };
    hInput.onchange = () => {
        wInput.value = Math.round(hInput.value * aspectRatio);
        processImage();
    };

    window.addEventListener('resize', () => {
        if (originalFile) syncSliderWidth();
    });

    function syncSliderWidth() {
        const width = container.offsetWidth;
        beforeImg.style.width = width + 'px';
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    // --- Logic ---
    async function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        originalFile = file;
        
        // Dateiname extrahieren (ohne Endung)
        originalBaseName = file.name.replace(/\.[^/.]+$/, "");
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        await img.decode();
        
        aspectRatio = img.width / img.height;
        wInput.value = img.width;
        hInput.value = img.height;
        
        const origFmtName = file.type.split('/')[1].toUpperCase().replace('JPEG', 'JPG');
        document.getElementById('orig-fmt').innerText = origFmtName;
        document.getElementById('orig-size').innerText = formatBytes(file.size);
        document.getElementById('orig-dim').innerText = `${img.width} × ${img.height} px`;
        
        beforeImg.style.backgroundImage = `url(${img.src})`;
        
        dropzone.style.display = 'none';
        outputSection.style.display = 'block';
        
        syncSliderWidth();
        processImage();
    }

    async function processImage() {
        if (!originalFile || isProcessing) return;
        isProcessing = true;
        
        loader.style.display = 'flex';
        // Start Pulsing
        newSizeEl.innerText = 'Berechne...';
        newSizeEl.classList.add('pulsing');
        sizeDiffEl.innerText = '';

        try {
            const options = {
                maxSizeMB: 10,
                maxWidthOrHeight: Math.max(wInput.value, hInput.value),
                useWebWorker: true,
                initialQuality: qSlider.value / 100,
                fileType: currentFormat
            };

            const compressedBlob = await imageCompression(originalFile, options);
            const url = URL.createObjectURL(compressedBlob);
            
            // Format & Size Update
            const newFmtName = currentFormat.split('/')[1].toUpperCase().replace('JPEG', 'JPG');
            document.getElementById('new-fmt').innerText = newFmtName;
            document.getElementById('img-after').style.backgroundImage = `url(${url})`;
            newSizeEl.innerText = formatBytes(compressedBlob.size);
            document.getElementById('new-dim').innerText = `${wInput.value} × ${hInput.value} px`;
            
            // Percentage calculation
            const saved = ((compressedBlob.size - originalFile.size) / originalFile.size) * 100;
            sizeDiffEl.innerText = (saved > 0 ? '+' : '') + saved.toFixed(1) + '%';
            sizeDiffEl.style.color = saved <= 0 ? '#81c784' : '#e57373';

            dlBtn.href = url;
            const ext = currentFormat.split('/')[1].replace('jpeg', 'jpg');
            // Nutze den Originalnamen!
            dlBtn.download = `${originalBaseName}-optimized.${ext}`;

        } catch (error) {
            console.error("Compression failed", error);
            newSizeEl.innerText = 'Fehler';
        } finally {
            isProcessing = false;
            loader.style.display = 'none';
            // Stop Pulsing
            newSizeEl.classList.remove('pulsing');
        }
    }

    // --- Slider Interaction Logic (Drag instead of Hover) ---
    let isSliding = false;

    // Start Dragging
    container.addEventListener('mousedown', () => isSliding = true);
    container.addEventListener('touchstart', () => isSliding = true, { passive: true });

    // Stop Dragging (Window level so it stops even if mouse leaves container)
    window.addEventListener('mouseup', () => isSliding = false);
    window.addEventListener('touchend', () => isSliding = false);

    const move = (e) => {
        if (!isSliding || outputSection.style.display !== 'block') return;
        
        const rect = container.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const x = clientX - rect.left;
        const percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
        
        clipper.style.width = percent + '%';
        handle.style.left = percent + '%';
    };

    container.addEventListener('mousemove', move);
    container.addEventListener('touchmove', move, { passive: true });

</script>
</body>
</html>
